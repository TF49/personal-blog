<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="涂家乐的个人博客 - 在校生 · Java / Android / Web / Linux · 热爱编程与折腾" />
    <title>涂家乐 | 个人博客</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      ;(function () {
        const params = new URLSearchParams(window.location.search)
        const p = params.get('p')
        if (!p) return
        params.delete('p')
        const newPath = decodeURIComponent(p)
        const rest = params.toString()
        const newUrl = `${newPath}${rest ? `?${rest}` : ''}${window.location.hash}`
        window.history.replaceState(null, '', newUrl)
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
